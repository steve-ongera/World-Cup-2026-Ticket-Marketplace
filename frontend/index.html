<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ─── Primary SEO ─────────────────────────────────────── -->
    <title>KickOff Tickets — FIFA World Cup 2026 Tickets | Buy & Sell</title>
    <meta
      name="description"
      content="Buy and sell guaranteed FIFA World Cup 2026 tickets. Browse all 104 matches across USA, Canada & Mexico. Group stage from €168. Final tickets available. Secure checkout, verified sellers."
    />
    <meta
      name="keywords"
      content="World Cup 2026 tickets, FIFA World Cup tickets, buy World Cup tickets, sell World Cup tickets, USA Canada Mexico 2026, football tickets"
    />
    <meta name="author" content="KickOff Tickets" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.kickofftickets.com/" />

    <!-- ─── Open Graph ────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="KickOff Tickets" />
    <meta
      property="og:title"
      content="KickOff Tickets — FIFA World Cup 2026 Tickets"
    />
    <meta
      property="og:description"
      content="The marketplace for guaranteed World Cup 2026 tickets. All 104 matches. Verified sellers. Buyer protection."
    />
    <meta
      property="og:image"
      content="https://www.kickofftickets.com/og-image.jpg"
    />
    <meta property="og:url" content="https://www.kickofftickets.com/" />

    <!-- ─── Twitter Card ──────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kickofftickets" />
    <meta
      name="twitter:title"
      content="KickOff Tickets — FIFA World Cup 2026"
    />
    <meta
      name="twitter:description"
      content="Buy guaranteed World Cup 2026 tickets. Browse all 104 matches, verified sellers, buyer protection."
    />
    <meta
      name="twitter:image"
      content="https://www.kickofftickets.com/twitter-card.jpg"
    />

    <!-- ─── Structured Data ───────────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "KickOff Tickets",
        "url": "https://www.kickofftickets.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.kickofftickets.com/matches?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- ─── Favicon ───────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0e1a" />

    <!-- ─── Fonts ─────────────────────────────────────────────── -->
    <!-- Bebas Neue for headings, DM Sans for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ─── Bootstrap Icons ───────────────────────────────────── -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- ─── Bootstrap CSS ─────────────────────────────────────── -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- ─── NProgress (slim page loader) ─────────────────────── -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.css"
    />
  </head>

  <body>
    <!-- No-JS fallback -->
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:sans-serif">
        KickOff Tickets requires JavaScript. Please enable it to continue.
      </div>
    </noscript>

    <!-- React mounts here -->
    <div id="root"></div>

    <!-- ─── Bootstrap JS Bundle ──────────────────────────────── -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFOGsRrVN/FO+9OmT/H0M4K9yCK"
      crossorigin="anonymous"
    ></script>

    <!-- ─── NProgress JS ─────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.js"></script>

    <!-- ─── Vite entry point ─────────────────────────────────── -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
